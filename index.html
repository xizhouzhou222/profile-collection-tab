<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Collection Tab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --tabs-gap: 20px;
            --tabs-pad-x: 12px;
            --search-pad-left: 8px;
            --search-pad-right: 16px;
            --search-fade-width: 16px;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .phone {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            height: 100dvh;
            background: #fff;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 60px rgba(0,0,0,.35);
        }
        .status-bar {
            height: 47px;
            background: url("Status Bar.png") center/cover no-repeat;
        }
        .header-nav-spacer {
            height: 44px;
            background: #fff;
            position: relative;
        }
        .nav-left-icon {
            position: absolute;
            left: 8px;
            top: 0;
            width: 40px;
            height: 44px;
        }
        .nav-right-icon {
            position: absolute;
            right: 8px;
            top: 0;
            width: 120px;
            height: 44px;
        }
        .nav-left-icon img,
        .nav-right-icon img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .profile-header {
            height: 270px;
            background-color: #fff;
            background-image: url("profile-header.svg");
            background-position: center top;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .tab-icons {
            height: 40px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            margin-top: 8px;
            border-bottom: 1px solid #efefef;
            padding: 0 16px;
        }
        .icon-item {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-item img {
            width: 22px;
            height: 22px;
            display: block;
        }
        .icon-item.active {
            color: #111;
            font-weight: 700;
            position: relative;
        }
        .icon-item.active::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -1px;
            width: 44px;
            height: 3px;
            border-radius: 3px;
            background: #111;
        }
        .tabs-layer {
            position: relative;
            height: 40px;
            border-bottom: 1px solid #efefef;
            background: #fff;
        }
        .tabs {
            height: 40px;
            display: flex;
            align-items: center;
            gap: var(--tabs-gap);
            padding: 0 var(--tabs-pad-x);
            padding-right: calc(22px + var(--search-pad-left) + var(--search-pad-right) + var(--search-fade-width) + 8px);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            position: relative;
            z-index: 1;
            background: transparent;
        }
        .tabs-layer.is-at-end .tabs {
            padding-right: calc(22px + var(--search-pad-left) + var(--search-pad-right) + 12px);
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            color: rgba(0, 0, 0, 0.48);
            font-family: "TikTok Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            white-space: nowrap;
        }
        .tab.active { color: #111; font-weight: 700; }
        .search {
            position: absolute;
            top: 0;
            right: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            padding: 0 var(--search-pad-right) 0 var(--search-pad-left);
            box-sizing: content-box;
            background: #fff;
            height: 100%;
            opacity: 1;
            transition: opacity 200ms ease;
        }
        .search::before {
            content: "";
            position: absolute;
            left: calc(-1 * var(--search-fade-width));
            top: 0;
            width: var(--search-fade-width);
            height: 40px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0), #fff);
        }
        .tabs-layer.is-at-end .search::before {
            display: none;
        }
        .tabs-layer.is-scrolling .search {
            opacity: 0;
            pointer-events: none;
        }
        .search img {
            width: 22px;
            height: 22px;
            display: block;
        }
        .grid {
            position: absolute;
            top: 451px;
            left: 0;
            right: 0;
            width: 100%;
            bottom: 0;
            display: grid;
            grid-template-columns: repeat(3, calc(100% / 3));
            gap: 1.5px;
            align-content: start;
            background: #fff;
            padding: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .card {
            aspect-ratio: 3 / 4;
            width: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        .c1 { background-image: url("grid-1.png"); }
        .c2 { background-image: url("grid-2.png"); }
        .c3 { background-image: url("grid-3.png"); }
        .c4 { background-image: url("grid-4.png"); }
        .c5 { background-image: url("grid-5.png"); }
        .c6 { background-image: url("grid-6.png"); }
        .c7 { background-image: url("grid-7.png"); }
        .c8 { background-image: url("grid-8.png"); }
        .c9 { background-image: url("grid-9.png"); }
        .count {
            position: absolute;
            left: 8px;
            bottom: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            text-shadow: 0 1px 2px rgba(0,0,0,.45);
            display: none;
        }
        .bottom-nav {
            position: absolute;
            inset: auto 0 0 0;
            height: 83px;
            background: #000;
            z-index: 30;
            pointer-events: none;
        }
        .control-panel {
            position: fixed;
            top: auto;
            left: 50%;
            right: auto;
            bottom: 8px;
            transform: translateX(-50%);
            z-index: 9999;
            width: min(360px, calc(100% - 20px));
            height: auto;
            max-height: calc(100% - 32px);
            overflow: auto;
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            backdrop-filter: blur(14px) saturate(140%);
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        .control-panel.capture-safe {
            -webkit-backdrop-filter: none !important;
            backdrop-filter: none !important;
            background: rgba(255, 255, 255, 0.96) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
        }
        .control-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            cursor: move;
            user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .panel-size {
            font-size: 11px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.55);
            white-space: nowrap;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 6px;
            row-gap: 6px;
            margin-bottom: 6px;
        }
        .metric-item label {
            display: block;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.7);
            margin-bottom: 2px;
        }
        .metric-input-row {
            display: grid;
            grid-template-columns: 1fr 30px;
            column-gap: 4px;
            align-items: center;
        }
        .metric-item input {
            width: 100%;
            height: 28px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-size: 12px;
            padding: 0 6px;
            outline: none;
        }
        .metric-item input:focus {
            border-color: #999;
        }
        .control-default {
            min-height: 34px;
            border-radius: 7px;
            background: #f3f3f3;
            color: rgba(0, 0, 0, 0.68);
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            line-height: 1.1;
            padding: 3px 0 2px;
        }
        .control-default-label {
            font-size: 9px;
            color: rgba(0, 0, 0, 0.45);
            margin-bottom: 1px;
        }
        .control-default-value {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.72);
        }
        .control-btn {
            margin-top: 2px;
            height: 30px;
            border: 0;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            padding: 0 10px;
        }
        .control-actions {
            margin-top: 2px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .control-btn.secondary {
            background: #2f2f2f;
        }
        .tab-input-pair {
            display: grid;
            grid-template-columns: 52px 1fr 52px 1fr;
            column-gap: 6px;
            align-items: center;
            margin-bottom: 4px;
        }
        .tab-input-pair.is-collapsible {
            display: none;
        }
        .control-panel.tabs-expanded .tab-input-pair.is-collapsible {
            display: grid;
        }
        .tab-input-pair label {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.7);
        }
        .tab-input-pair input {
            width: 100%;
            height: 28px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-size: 12px;
            padding: 0 6px;
            outline: none;
        }
        .tab-input-pair input:focus {
            border-color: #999;
        }
        .toggle-rows-btn {
            width: 100%;
            height: 26px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            color: rgba(0, 0, 0, 0.72);
            font-size: 12px;
            cursor: pointer;
            margin: 2px 0 6px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="control-title">
            <span>Tab 控制面板</span>
            <span id="panel-size" class="panel-size">-- x --</span>
        </div>
        <div class="metric-grid">
            <div class="metric-item">
                <label for="ctrl-gap">Tab 间距</label>
                <div class="metric-input-row">
                    <input id="ctrl-gap" type="number" value="20" min="0">
                    <div class="control-default"><span class="control-default-label">默认值</span><span class="control-default-value">20</span></div>
                </div>
            </div>
            <div class="metric-item">
                <label for="ctrl-pad">左右 Padding</label>
                <div class="metric-input-row">
                    <input id="ctrl-pad" type="number" value="12" min="0">
                    <div class="control-default"><span class="control-default-label">默认值</span><span class="control-default-value">12</span></div>
                </div>
            </div>
            <div class="metric-item">
                <label for="ctrl-search-pad-left">Search 左侧</label>
                <div class="metric-input-row">
                    <input id="ctrl-search-pad-left" type="number" value="8" min="0">
                    <div class="control-default"><span class="control-default-label">默认值</span><span class="control-default-value">8</span></div>
                </div>
            </div>
            <div class="metric-item">
                <label for="ctrl-search-pad-right">Search 右侧</label>
                <div class="metric-input-row">
                    <input id="ctrl-search-pad-right" type="number" value="16" min="0">
                    <div class="control-default"><span class="control-default-label">默认值</span><span class="control-default-value">16</span></div>
                </div>
            </div>
        </div>
        <div class="tab-input-pair is-collapsible">
            <label for="ctrl-tab-1">Tab 1</label><input id="ctrl-tab-1" type="text" value="Posts 91">
            <label for="ctrl-tab-2">Tab 2</label><input id="ctrl-tab-2" type="text" value="Collections 2">
        </div>
        <div class="tab-input-pair is-collapsible">
            <label for="ctrl-tab-3">Tab 3</label><input id="ctrl-tab-3" type="text" value="Sounds 20">
            <label for="ctrl-tab-4">Tab 4</label><input id="ctrl-tab-4" type="text" value="Effects 3">
        </div>
        <div class="tab-input-pair is-collapsible">
            <label for="ctrl-tab-5">Tab 5</label><input id="ctrl-tab-5" type="text" value="Products 7">
            <label for="ctrl-tab-6">Tab 6</label><input id="ctrl-tab-6" type="text" value="Playlist 1">
        </div>
        <div class="tab-input-pair is-collapsible">
            <label for="ctrl-tab-7">Tab 7</label><input id="ctrl-tab-7" type="text" value="Movies and TV 2">
            <label for="ctrl-tab-8">Tab 8</label><input id="ctrl-tab-8" type="text" value="Comments 2">
        </div>
        <div class="tab-input-pair is-collapsible">
            <label for="ctrl-tab-9">Tab 9</label><input id="ctrl-tab-9" type="text" value="Hashtags 2">
            <label for="ctrl-tab-10">Tab 10</label><input id="ctrl-tab-10" type="text" value="Series 2">
        </div>
        <button id="ctrl-toggle-tabs" class="toggle-rows-btn" type="button">展开更多 Tab 名称</button>
        <div class="control-actions">
            <button id="ctrl-apply" class="control-btn" type="button">应用修改</button>
            <button id="ctrl-shot" class="control-btn secondary" type="button">截图 x3</button>
        </div>
    </div>

    <div class="phone">
        <div class="status-bar"></div>
        <div class="header-nav-spacer">
            <div class="nav-left-icon"><img src="nav-left-trailing.svg" alt="left nav icon"></div>
            <div class="nav-right-icon"><img src="nav-right-leading.svg" alt="right nav icon"></div>
        </div>
        <div class="profile-header"></div>

        <div class="tab-icons">
            <div class="icon-item"><img src="profile-tab-icon-4.svg" alt="tab icon 1"></div>
            <div class="icon-item"><img src="profile-tab-icon-1.svg" alt="tab icon 2"></div>
            <div class="icon-item"><img src="profile-tab-icon-2.svg" alt="tab icon 3"></div>
            <div class="icon-item active"><img src="profile-tab-icon-5.svg" alt="tab icon 4"></div>
            <div class="icon-item"><img src="profile-tab-icon-3.svg" alt="tab icon 5"></div>
        </div>

        <div class="tabs-layer">
            <div class="tabs">
                <div class="tab active" data-tab-item="1">Posts 91</div>
                <div class="tab" data-tab-item="2">Collections 2</div>
                <div class="tab" data-tab-item="3">Sounds 20</div>
                <div class="tab" data-tab-item="4">Effects 3</div>
                <div class="tab" data-tab-item="5">Products 7</div>
                <div class="tab" data-tab-item="6">Playlist 1</div>
                <div class="tab" data-tab-item="7">Movies and TV 2</div>
                <div class="tab" data-tab-item="8">Comments 2</div>
                <div class="tab" data-tab-item="9">Hashtags 2</div>
                <div class="tab" data-tab-item="10">Series 2</div>
            </div>
            <div class="search"><img src="profile-search-icon.svg" alt="search"></div>
        </div>

        <div class="grid">
            <div class="card c1"><span class="count">▶ 62.8K</span></div>
            <div class="card c2"><span class="count">▶ 51.3K</span></div>
            <div class="card c3"><span class="count">▶ 783.8K</span></div>
            <div class="card c4"></div>
            <div class="card c5"></div>
            <div class="card c6"></div>
            <div class="card c7"></div>
            <div class="card c8"></div>
            <div class="card c9"></div>
        </div>

        <div class="bottom-nav"></div>
    </div>
    <script src="html2canvas.min.js"></script>
    <script>
        (function () {
            const root = document.documentElement;
            const applyBtn = document.getElementById("ctrl-apply");
            const shotBtn = document.getElementById("ctrl-shot");
            const toggleTabsBtn = document.getElementById("ctrl-toggle-tabs");
            const gapInput = document.getElementById("ctrl-gap");
            const padInput = document.getElementById("ctrl-pad");
            const searchPadLeftInput = document.getElementById("ctrl-search-pad-left");
            const searchPadRightInput = document.getElementById("ctrl-search-pad-right");
            const panel = document.querySelector(".control-panel");
            const title = document.querySelector(".control-title");
            const panelSize = document.getElementById("panel-size");
            const tabsLayer = document.querySelector(".tabs-layer");
            const tabsEl = document.querySelector(".tabs");
            const phoneEl = document.querySelector(".phone");
            let tabsExpanded = false;

            function applyControls() {
                const gap = Math.max(0, Number(gapInput.value) || 0);
                const pad = Math.max(0, Number(padInput.value) || 0);
                const searchPadLeft = Math.max(0, Number(searchPadLeftInput.value) || 0);
                const searchPadRight = Math.max(0, Number(searchPadRightInput.value) || 0);
                root.style.setProperty("--tabs-gap", gap + "px");
                root.style.setProperty("--tabs-pad-x", pad + "px");
                root.style.setProperty("--search-pad-left", searchPadLeft + "px");
                root.style.setProperty("--search-pad-right", searchPadRight + "px");

                for (let i = 1; i <= 10; i += 1) {
                    const textInput = document.getElementById("ctrl-tab-" + i);
                    const tabNode = document.querySelector('[data-tab-item="' + i + '"]');
                    if (textInput && tabNode) {
                        tabNode.textContent = textInput.value.trim() || ("Tab " + i);
                    }
                }
                updateTabScrollState();
            }

            applyBtn.addEventListener("click", applyControls);
            toggleTabsBtn.addEventListener("click", function () {
                tabsExpanded = !tabsExpanded;
                panel.classList.toggle("tabs-expanded", tabsExpanded);
                toggleTabsBtn.textContent = tabsExpanded ? "收起 Tab 名称" : "展开更多 Tab 名称";
            });
            shotBtn.addEventListener("click", async function () {
                let prevPanelScrollTop = panel.scrollTop;
                const prevTransform = panel.style.transform;
                const prevLeft = panel.style.left;
                const prevRight = panel.style.right;
                try {
                    if (!window.html2canvas) {
                        alert("截图库加载失败，请检查网络后重试。");
                        return;
                    }
                    panel.scrollTop = 0;
                    panel.classList.add("capture-safe");
                    panel.style.transform = "none";
                    panel.style.left = "8px";
                    panel.style.right = "8px";
                    const viewportWidth = Math.round(window.innerWidth);
                    const viewportHeight = Math.round(window.innerHeight);
                    const outputCanvas = await window.html2canvas(document.documentElement, {
                        scale: 3,
                        backgroundColor: null,
                        useCORS: false,
                        allowTaint: true,
                        logging: false,
                        scrollX: 0,
                        scrollY: 0,
                        x: 0,
                        y: 0,
                        width: viewportWidth,
                        height: viewportHeight,
                        windowWidth: viewportWidth,
                        windowHeight: viewportHeight
                    });
                    panel.classList.remove("capture-safe");
                    panel.style.transform = prevTransform;
                    panel.style.left = prevLeft;
                    panel.style.right = prevRight;
                    panel.scrollTop = prevPanelScrollTop;
                    const now = new Date();
                    const stamp = [
                        now.getFullYear(),
                        String(now.getMonth() + 1).padStart(2, "0"),
                        String(now.getDate()).padStart(2, "0"),
                        String(now.getHours()).padStart(2, "0"),
                        String(now.getMinutes()).padStart(2, "0"),
                        String(now.getSeconds()).padStart(2, "0")
                    ].join("");
                    outputCanvas.toBlob(function (blob) {
                        if (!blob) {
                            alert("截图失败：无法生成图片数据。请尝试通过本地服务预览页面后再截图。");
                            return;
                        }
                        const link = document.createElement("a");
                        link.download = "profile-collection-tab-x3-" + stamp + ".png";
                        link.href = URL.createObjectURL(blob);
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                        setTimeout(function () {
                            URL.revokeObjectURL(link.href);
                        }, 1000);
                    }, "image/png");
                } catch (err) {
                    panel.classList.remove("capture-safe");
                    panel.style.transform = prevTransform;
                    panel.style.left = prevLeft;
                    panel.style.right = prevRight;
                    panel.scrollTop = prevPanelScrollTop;
                    const detail = err && err.message ? err.message : String(err);
                    alert("截图失败：" + detail + "。建议通过本地 HTTP 服务打开此页面后再试。");
                }
            });

            function isAtRightEnd() {
                const epsilon = 1;
                return tabsEl.scrollLeft + tabsEl.clientWidth >= tabsEl.scrollWidth - epsilon;
            }

            function updateTabScrollState() {
                tabsLayer.classList.toggle("is-at-end", isAtRightEnd());
            }

            function updatePanelSize() {
                const width = Math.round(window.innerWidth);
                const height = Math.round(window.innerHeight);
                panelSize.textContent = width + " x " + height;
            }

            let scrollHideTimer = null;
            tabsEl.addEventListener("scroll", function () {
                tabsLayer.classList.add("is-scrolling");
                updateTabScrollState();
                window.clearTimeout(scrollHideTimer);
                scrollHideTimer = window.setTimeout(function () {
                    tabsLayer.classList.remove("is-scrolling");
                    updateTabScrollState();
                }, 120);
            });

            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;
            let activePointerId = null;

            function startDrag(e) {
                if (e.target.closest("input, button")) return;
                isDragging = true;
                activePointerId = e.pointerId;
                const rect = panel.getBoundingClientRect();
                panel.style.bottom = "auto";
                panel.style.transform = "none";
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                panel.setPointerCapture(e.pointerId);
                e.preventDefault();
            }

            function moveDrag(e) {
                if (!isDragging || e.pointerId !== activePointerId) return;
                panel.style.left = Math.max(8, e.clientX - offsetX) + "px";
                panel.style.top = Math.max(8, e.clientY - offsetY) + "px";
                panel.style.right = "auto";
            }

            function endDrag(e) {
                if (!isDragging || e.pointerId !== activePointerId) return;
                isDragging = false;
                activePointerId = null;
                panel.releasePointerCapture(e.pointerId);
            }

            panel.addEventListener("pointerdown", startDrag);
            panel.addEventListener("pointermove", moveDrag);
            panel.addEventListener("pointerup", endDrag);
            panel.addEventListener("pointercancel", endDrag);

            updateTabScrollState();
            updatePanelSize();
            window.addEventListener("resize", updatePanelSize);
        })();
    </script>
</body>
</html>
